# .github/workflows/bundle-android-src.yml
name: Split AOSP Archive
on:
  workflow_dispatch:

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Init and Sync
        run: |
          git config --global user.name "Gemini-Programming-Unit"
          git config --global user.email "team@example.com"
          # --depth=1 はここで指定する！
          repo init -u https://android.googlesource.com/platform/manifest -b android-15.0.0_r1 --depth=1
          repo sync -j$(nproc) --no-tags --no-clone-bundle

      - name: Archive by Repository
        run: |
          # ディレクトリごとに tar 圧縮する
          # .repo ディレクトリはメタデータなので除外して、個別のプロジェクトディレクトリを圧縮
          mkdir archives
          for dir in */; do
            if [ "$dir" != ".repo/" ] && [ -d "$dir" ]; then
              tar -czf "archives/${dir%/}.tar.gz" "$dir"
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-15-split-archive
          name: "Android 15 Split Archive"
          # archives フォルダ内のすべての tar.gz をアップロード
          files: archives/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

