# .github/workflows/bundle-android-src.yml
name: Sync Entire AOSP
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Install Repo Tool
        run: |
          # Androidの管理ツール 'repo' をインストール
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialize AOSP Manifest
        run: |
          # AOSPの全リポジトリを同期する準備
          git config --global user.name "Gemini-Programming-Unit"
          git config --global user.email "team@example.com"
          repo init -u https://android.googlesource.com/platform/manifest -b android-15.0.0_r1
          
      - name: Sync Everything
        run: |
          # 全てをダウンロード（鬼のような容量と時間がかかるぞ！）
          repo sync -j$(nproc) --no-tags --no-clone-bundle --depth 1

      - name: Package Everything
        run: |
          # 全てをtarで固める（まさに「全財産」だ）
          tar -czf android-15-universe.tar.gz .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-15-full-universe
          name: "Android 15 Full Universe Archive"
          files: android-15-universe.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
