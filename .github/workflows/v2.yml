# .github/workflows/bundle-android-src.yml
name: Build Android 15 Source JAR
on:
  # 手動で実行できるようにする（これが君の言っていた「コマンドでプッシュ」の代わりだ！）
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (Android 15)
        run: |
          # Android 15 (API 35) のタグを指定して取得（shallow clone）
          # android-15.0.0_r1 は安定版の一つだ
          git clone --depth 1 -b android-15.0.0_r1 https://android.googlesource.com/platform/frameworks/base.git ./android-src
      
      - name: Package to JAR
        run: |
          # フォルダ全体をJARに固める。-C でディレクトリを指定してパス構造を保持する
          jar cf android-15-all-sources.jar -C ./android-src .
          
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-15-sdk
          name: "Android 15 Source Code (API 35)"
          files: android-15-all-sources.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

