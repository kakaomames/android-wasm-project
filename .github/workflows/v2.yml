name: Extract Android Core
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Surgical Strike (Clone only essential parts)
        run: |
          mkdir -p ./android-src
          git clone --depth 1 https://android.googlesource.com/platform/frameworks/base.git ./android-src/frameworks-base
          git clone --depth 1 https://android.googlesource.com/platform/system/core.git ./android-src/system-core
          git clone --depth 1 https://android.googlesource.com/platform/frameworks/native.git ./android-src/frameworks-native

      - name: Package Components
        run: |
          # ディレクトリごとに個別に圧縮する
          cd ./android-src
          for dir in */; do
            # 末尾のスラッシュを除去してファイル名にする
            name=${dir%/}
            tar -czf "../${name}.tar.gz" "$dir"
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: android-core-v2
          name: "Android 15 Core Components (Split)"
          # ワイルドカードで全ての .tar.gz をアップロード！
          files: ./*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
