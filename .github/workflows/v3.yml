name: Fixed Safe APK Installer (x86_64 Emulator with ARM Translation)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable KVM Group Permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download All Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "ACTION: タグ名 'Apks' のリリースから全アセットをダウンロード！"
          # '--latest' を消して、代わりに 'Apks' を指定するぞ！
          gh release download Apks --pattern "*"
          
          echo "ACTION: ダウンロード完了！ファイル一覧を表示します："
          ls -la

      - name: Run x86_64 Emulator and Safely Install Packages
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # API 30 の google_apis (x86_64) を使うことで、内部のARM翻訳機能を利用するぞ！
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          script: |
            echo "ACTION: x86_64エミュレータが正常起動しました！"
            adb devices

            # --- 作戦1: 単体APKのインストール ---
            for apk in *.apk; do
              if [ -f "$apk" ]; then
                echo "ACTION: 単体APKインストール中 -> $apk"
                adb install -r "$apk"
              fi
            done

            # --- 作戦2: パッケージの個別解凍＆一括インストール ---
            for package in *.apks *.xapk *.apkm; do
              if [ -f "$package" ]; then
                echo "--------------------------------------------------"
                echo "ACTION: パッケージを発見 -> $package"
                
                tmp_dir="tmp_${package//./_}"
                mkdir -p "$tmp_dir"
                
                echo "ACTION: $package を $tmp_dir に解凍中..."
                unzip -o "$package" -d "$tmp_dir/" || true
                
                if [ -n "$(find "$tmp_dir" -name "*.apk" -print -quit)" ]; then
                  echo "ACTION: $package の中身を一括インストール中..."
                  # --bypass-low-target-sdk-block を一応つけて古いアプリでも入りやすくするお守り
                  find "$tmp_dir" -name "*.apk" -print0 | xargs -0 adb install-multiple -r
                  echo "ACTION: $package のインストールが完了しました！"
                else
                  echo "ACTION: [WARNING] APKが見つかりませんでした。"
                fi
                
                rm -rf "$tmp_dir"
              fi
            done

            echo "--------------------------------------------------"
            echo "ACTION: パッケージ一覧を確認します："
            adb shell pm list packages
            echo "ACTION: ミッション完了！宿敵『FATALエラー』を撃破したぜ！"
