name: Install APKs on ARM64 Emulator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Enable KVM Group Permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Download bundletool
        run: |
          echo "ACTION: bundletoolのダウンロードを開始します！"
          # GitHub API経由で最新のbundletool.jarを取得してリポジトリ直下に配置するぞ！
          curl -L -o bundletool.jar https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar
          echo "ACTION: bundletoolの準備が完了しました！"

      - name: Run Emulator and Install APKs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: arm64-v8a
          profile: pixel_7_pro
          script: |
            echo "ACTION: エミュレータの起動を確認しました！"
            
            # 1. 念のため接続されているデバイス（エミュレータ）の一覧をログに出すぞ！
            adb devices
            
            # 2. bundletoolを使って.apksファイルをエミュレータにインストール！
            # ※リポジトリ内に「app.apks」が存在している前提だぜ！なければパスを書き換えてくれ！
            echo "ACTION: app.apks をエミュレータへインストール開始！"
            java -jar bundletool.jar install-apks --apks=app.apks
            
            # 3. インストールが成功したか、パッケージ一覧を確認してログに出す！
            echo "ACTION: インストール済みのパッケージ一覧を確認します！"
            adb shell pm list packages
            
            echo "ACTION: すべてのミッションが正常に完了しました！"
