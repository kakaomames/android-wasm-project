name: APK to Web Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**' # スクリプト更新時
  workflow_dispatch: # 手動でも動かせるようにしておく

permissions:
  contents: write # リポジトリへの書き込み権限（必須！）

jobs:
  convert-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Conversion Script
        run: |
          chmod +x ./scripts/process_apk.sh
          ./scripts/process_apk.sh > log.txt
          cp -vf log.txt ./dist/assets/log.txt || true
          TIME=$(date "+%Y年%m月%d日") || true
          echo "$TIMEに実行" > time.txt || true
          cp -vf "time.txt" ".time.txt" || true


      - name: Setup GH CLI and Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 日付タグの生成
          TIME=$(date "+%Y%m%d")
          
          # リリースが存在しなければ作成
          gh release view "$TIME" || gh release create "$TIME" --title "Build $TIME" --notes "自動生成されたアセット"
          
          # アセットをアップロード（--clobberで上書き）
          gh release upload "$TIME" ./dist/assets/assets.zip --clobber
          echo "✅ [Release] アセットの公開完了！"

      - name: Commit and Push Logs
        run: |
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          # ZIP以外（ログや時間）だけをステージング
          git add ./*.txt
          
          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "✨ ログ変更なし。"
          else
            git commit -m "chore: 📝 自動ビルドログを更新 [skip ci]"
            git push origin HEAD:main
            echo "✅ ログの同期完了！"
          fi
