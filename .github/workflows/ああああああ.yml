name: APK to Web Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**' # スクリプト更新時
  workflow_dispatch: # 手動でも動かせるようにしておく

permissions:
  contents: write # リポジトリへの書き込み権限（必須！）

jobs:
  convert-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Conversion Script
        run: |
          chmod +x ./scripts/process_apk.sh
          ./scripts/process_apk.sh
          TIME=$(date "+%Y年%m月%d日") || true
          echo "$TIMEに実行" > time.txt || true


      - name: Commit and Push Assets
        run: |
          # ここにさっきのシェルスクリプトを直接書く！
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          git add ./dist/assets/
          
          # コミット実行（変更がなければechoするだけ）
          git commit -m "chore: 🚀 自動変換されたアセットを追加 [skip ci]" || echo "✨ 変更なし！コミットは不要だ。"
          
          # プッシュ実行
          git push origin HEAD:main || echo "🚀 プッシュする内容はないぜ。"
