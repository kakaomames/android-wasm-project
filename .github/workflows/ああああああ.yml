name: APK to Web Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**' # スクリプト更新時
  workflow_dispatch: # 手動でも動かせるようにしておく

permissions:
  contents: write # リポジトリへの書き込み権限（必須！）

jobs:
  convert-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Conversion Script
        run: |
          chmod +x ./scripts/process_apk.sh
          ./scripts/process_apk.sh
        env:
          # 必要なら環境変数をここに記述
          TARGET_APK: "pokemon.apks"

      - name: Commit and Push Assets
        run: |
          # Gitの設定
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          # 変更があるか確認
          if git diff --quiet ./dist/assets/ && git diff --staged --quiet; then
            echo "✨ 変更なし！コミットは不要だ。"
          else
            # 変更分を追加
            git add ./dist/assets/
            
            # コミット実行
            git commit -m "chore: 🚀 自動変換されたアセットを追加 [skip ci]"
            
            # プッシュ実行
            git push origin HEAD:main
            echo "✅ アセットの同期完了！"
          fi
