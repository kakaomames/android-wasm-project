name: ARM64 Native Wasm Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 隊員の狙い通り、ARM64ネイティブ環境で動かす！
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Emscripten SDKをインストール
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: ビルドスクリプトを実行
        run: |
          chmod +x build.sh
          ./build.sh

      - name: ビルド成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: gem-os-wasm
          path: |
            build_out/*
            
      - name: Commit and Push Logs
        run: |
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          # ZIP以外（ログや時間）だけをステージング
          git add ./build_out/* || true
          
          # 変更がある場合のみコミット
          if git diff --cached --quiet; then
            echo "✨ ログ変更なし。"
          else
            git commit -m "chore: 📝 自動ビルドログを更新 [skip ci]" || true
            git push origin HEAD:main || true
            echo "✅ ログの同期完了！"
          fi
