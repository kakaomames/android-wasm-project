name: ARM64 Native Wasm Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    # 隊員の狙い通り、ARM64ネイティブ環境で動かす！
    runs-on: ubuntu-24.04-arm
    
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Emscripten SDKをインストール
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'

      - name: ビルドスクリプトを実行
        run: |
          git clone https://github.com/unicorn-engine/unicorn.git

          chmod +x build.sh
          ./build.sh

      - name: ビルド成果物をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: gem-os-wasm
          path: |
            build_out/*