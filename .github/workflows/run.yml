name: Android-Wasm-v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      # Emscriptenの準備
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'

      # RetDecの準備
      - name: Download and Extract RetDec
        run: |
          curl -L https://github.com/avast/retdec/releases/download/v5.0/RetDec-v5.0-Linux-Release.tar.xz -o retdec.tar.xz
          mkdir -p $GITHUB_WORKSPACE/retdec
          tar -xf retdec.tar.xz -C $GITHUB_WORKSPACE/retdec --strip-components=1
          echo "$GITHUB_WORKSPACE/retdec/bin" >> $GITHUB_PATH

      # 攻略開始！
      - name: Start!!
        run: |
          echo "retdec/" >> .gitignore
          echo "retdec.tar.xz" >> .gitignore
          # パス確認
          retdec-decompiler --help || echo "RetDec path error!"
          
          # 調査開始
          bash gits.sh a.txt libminecraftpe.so
          bash run.sh
          
          # 不要な重荷は捨てる
          rm -f libminecraftpe.so || true
          rm -f libs/libminecraftpe.so || true

      # 成果報告（Auto-commit）
      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 差分があるときだけコミット・プッシュ
          if ! git diff --staged --quiet; then
            git commit -m "build: auto-compile minecraft web edition"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
