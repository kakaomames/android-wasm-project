name: Android-Wasm-v2

on:
  workflow_dispatch: # ボタン一発で手動起動！

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # コミットを書き戻すために必要！
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install RetDec
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git python3
          git clone https://github.com/avast/retdec
          cd retdec
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
          make -j$(nproc)
          sudo make install
          cd ../.. && rm -rf retdec


      - name: Start!!
        run: |
          bash gits.sh a.txt libminecraftpe.so
          bash run.sh
          sleep 5
          echo "555"
          rm -rf libminecraft.so || true
          rm -rf libs/libminecraftpe.so
  

      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "build: auto-compile minecraft web edition" && git push)
