name: Android-Wasm-v2

on:
  workflow_dispatch: # ボタン一発で手動起動！

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # コミットを書き戻すために必要！
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false  # ← これを入れる！サブモジュール取得をオフにする

      - name: Cache RetDec Installation
        id: cache-retdec
        uses: actions/cache@v4
        with:
          # ここに保存したいディレクトリを指定する
          path: |
            /usr/local/bin/retdec-*
            /usr/local/include/retdec
            /usr/local/lib/retdec
          key: ${{ runner.os }}-retdec-v1 # バージョン管理用キー

      - name: Install/Build RetDec
        if: steps.cache-retdec.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/retdec-install
          git clone https://github.com/avast/retdec
          cd retdec
          mkdir build && cd build
          # インストール先をワークスペース内のフォルダに変更
          cmake .. -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/retdec-install
          make -j$(nproc)
          make install
          cd ../.. && rm -rf retdec

      - name: Add RetDec to PATH
        run: echo "$GITHUB_WORKSPACE/retdec-install/bin" >> $GITHUB_PATH

      - name: Start!!
        run: |
          # 実行前にパスが通っているか確認
          retdec-decompiler --help || echo "RetDec not found!"
          bash gits.sh a.txt libminecraftpe.so
          bash run.sh
          rm -rf libminecraftpe.so || true
          rm -rf libs/libminecraftpe.so
  

      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミット
          git diff --quiet && git diff --staged --quiet || (git commit -m "build: auto-compile minecraft web edition" && git push)
