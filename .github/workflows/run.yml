name: Android-Wasm-v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      # Emscriptenの準備
      # 変更前: actions-cache-folder: 'emsdk-cache'
      # 変更後: actions-cache-folder: 'emsdk-cache-v2' (バージョンを上げる)
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache-v2'

      - name: Download and Extract RetDec
        run: |
          # 1. gitignoreを作成（巨大ファイルをリポジトリに入れない！）
          echo "retdec/" >> .gitignore
          echo "retdec.tar.xz" >> .gitignore
          
          # 2. ダウンロードと展開
          curl -L https://github.com/avast/retdec/releases/download/v5.0/RetDec-v5.0-Linux-Release.tar.xz -o retdec.tar.xz
          mkdir -p $GITHUB_WORKSPACE/retdec
          tar -xf retdec.tar.xz -C $GITHUB_WORKSPACE/retdec --strip-components=1
          
          # 3. パスを強制設定（環境変数としてエクスポート）
          echo "RETDEC_INSTALL_DIR=$GITHUB_WORKSPACE/retdec" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/retdec/bin" >> $GITHUB_PATH
          
          # 4. どこにあるか確認！（デバッグ用）
          echo "Checking binary location:"
          ls -l $GITHUB_WORKSPACE/retdec/bin/retdec-decompiler || echo "Binary not found in expected location!"

      - name: Verify Installation
        run: |
          # ちゃんと動くか、フルパスで試す
          $GITHUB_WORKSPACE/retdec/bin/retdec-decompiler --help || echo "RetDec path error!"
          
      - name: Start!!
        run: |
          # 実行前にパスを通す
          export PATH=$PATH:$GITHUB_WORKSPACE/retdec/bin
          
          # 調査開始
          bash gits.sh a.txt libminecraftpe.so
          
          # run.sh の中から retdec-decompiler を呼ぶ際もパスが有効なはずだ
          bash run.sh

      # 成果報告（Auto-commit）
      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 差分があるときだけコミット・プッシュ
          if ! git diff --staged --quiet; then
            git commit -m "build: auto-compile minecraft web edition"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
