name: Android-Wasm-v2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      # Emscriptenの準備
      # 変更前: actions-cache-folder: 'emsdk-cache'
      # 変更後: actions-cache-folder: 'emsdk-cache-v2' (バージョンを上げる)
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache-v2'

      - name: Download and Extract RetDec
        run: |
          # 1. gitignoreを作成（巨大ファイルをリポジトリに入れない！）
          echo "retdec/" >> .gitignore
          echo "retdec.tar.xz" >> .gitignore
          
          # 2. ダウンロードと展開
          curl -L https://github.com/avast/retdec/releases/download/v5.0/RetDec-v5.0-Linux-Release.tar.xz -o retdec.tar.xz
          mkdir -p $GITHUB_WORKSPACE/retdec
          tar -xf retdec.tar.xz -C $GITHUB_WORKSPACE/retdec --strip-components=1
          
      - name: Setup Path for RetDec
        run: |
          # 1. パスを修正！binフォルダは存在しないので、retdecディレクトリそのものを指定する
          echo "$GITHUB_WORKSPACE/retdec" >> $GITHUB_PATH
          
          # 2. 実行権限を確実に付与（念のため）
          chmod +x $GITHUB_WORKSPACE/retdec/retdec-decompiler
          
          # 3. 最終確認（これでパスが通っているはずだ！）
          echo "Checking retdec-decompiler location..."
          which retdec-decompiler || echo "まだ見つからない！"
          retdec-decompiler --help || echo "実行権限の問題か？"

      - name: Verify Installation
        run: |
          # ちゃんと動くか、フルパスで試す
          $GITHUB_WORKSPACE/retdec/bin/retdec-decompiler --help || echo "RetDec path error!"
          
      - name: Start!!
        run: |
          # 実行前にパスを通す
          export PATH=$PATH:$GITHUB_WORKSPACE/retdec/bin
          
          # 調査開始
          bash gits.sh a.txt libminecraftpe.so
          
          # run.sh の中から retdec-decompiler を呼ぶ際もパスが有効なはずだ
          bash run.sh

      # 成果報告（Auto-commit）
      - name: Auto-commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. 巨大ファイルをGitの管理対象から「物理的に」削除し、Indexからも消す
          # これでGitの「契約」を強制解除する
          git rm -f --cached libminecraftpe.so || true
          git rm -f --cached libs/libminecraftpe.so || true
          git rm -rf --cached emsdk-cache/ || true
          git rm -rf --cached emsdk-cache-v2/ || true
          git rm -rf --cached retdec/ || true

          # 2. .gitignore を作り直す（再確認！）
          echo "libminecraftpe.so" > .gitignore
          echo "libs/libminecraftpe.so" >> .gitignore
          echo "emsdk-cache/" >> .gitignore
          echo "emsdk-cache-v2/" >> .gitignore
          echo "retdec/" >> .gitignore
          echo "retdec.tar.xz" >> .gitignore

          # 3. 再度ステージング
          # これで.gitignoreが効いた状態でaddされるはずだ
          git add .

          # 4. コミットとプッシュ
          if ! git diff --staged --quiet; then
            git commit -m "build: update generated source code"
            git push
          else
            echo "No changes detected. Skipping commit."
          fi
